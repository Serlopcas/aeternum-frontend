<div class="shell">
  <app-sidebar
    [(collapsed)]="sidebarCollapsed"
    [(mobileOpen)]="mobileSidebarOpen"
    (openAbout)="aboutOpen.set(true)"
  />

  <div
    class="shell__overlay"
    [class.shell__overlay--open]="mobileSidebarOpen()"
    aria-hidden="true"
    (click)="closeMobileSidebar()"
  ></div>

  <div class="shell__main" [class.shell__main--collapsed]="sidebarCollapsed()">
    <app-topbar (openAbout)="aboutOpen.set(true)">
      <button
        class="topbar__hamburger"
        type="button"
        aria-label="Abrir menú"
        (click)="mobileSidebarOpen.set(true)"
      >
        <span class="topbar__hamburger-icon">☰</span>
      </button>
    </app-topbar>
    <main class="shell__content">
      <router-outlet />
    </main>
    <app-footer (openAbout)="aboutOpen.set(true)" />
  </div>
</div>
<app-toast-outlet />
<app-about-dialog [open]="aboutOpen()" (close)="aboutOpen.set(false)" />
