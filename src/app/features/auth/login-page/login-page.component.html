<div class="login-page">
  <div class="login-card">
    <div class="login-card__brand">
      <img class="login-card__logo-img" src="assets/AeternumTrackLogo.svg" alt="Aeternum Track" />
      <p class="login-card__subtitle">Plataforma interna de gestión</p>
    </div>

    <app-api-error-alert [error]="error()" />

    <form
      class="login-form"
      (ngSubmit)="loginForm.form.markAllAsTouched(); loginForm.valid && onSubmit()"
      #loginForm="ngForm"
    >
      <div class="form-group">
        <label class="form-label" for="username">Usuario o email</label>
        <input
          class="form-input"
          id="username"
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          autocomplete="username"
          placeholder="admin"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input
          class="form-input"
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      <button
        class="btn btn--primary btn--full"
        type="submit"
        [disabled]="loading() || !username || !password"
        aria-label="Iniciar sesión"
      >
        @if (loading()) {
          Iniciando sesión...
        } @else {
          Iniciar sesión
        }
      </button>
    </form>
  </div>
</div>
<app-toast-outlet />
