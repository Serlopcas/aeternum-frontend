<div class="date-range">
  <div class="date-range__field">
    <label class="date-range__label">Desde</label>
    <input
      type="date"
      class="date-range__input"
      max="9999-12-31"
      [ngModel]="from()"
      (ngModelChange)="updateFrom($event)"
      aria-label="Fecha desde"
    />
  </div>
  <div class="date-range__field">
    <label class="date-range__label">Hasta</label>
    <input
      type="date"
      class="date-range__input"
      max="9999-12-31"
      [ngModel]="to()"
      (ngModelChange)="updateTo($event)"
      aria-label="Fecha hasta"
    />
  </div>
</div>
